<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Data Assistant</title>
    <link rel="shortcut icon" href="../frontend/icons/icon128.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h2>AI Test Data Assistant</h2>
            <p>Generate realistic test data instantly</p>
        </div>

        <label for="projectType">Project Type</label>
        <select id="projectType">
            <option value="shopify">Shopify</option>
            <option value="wordpress">WordPress</option>
            <option value="generic">Generic Website</option>
        </select>

        <label for="dataType">Data Type</label>
        <select id="dataType">
            <option value="customers">Customers</option>
        </select>

        <label for="country">Country</label>
        <select id="country">
            <option value="australia">Australia</option>
            <option value="usa">USA</option>
            <option value="india">India</option>
            <option value="uk">United Kingdom</option>
        </select>

        <label for="recordCount">Number of Records</label>
        <input
            type="number"
            id="recordCount"
            value="10"
            min="1"
            max="1000"
        >

        <button id="generateBtn">
            Generate Data
        </button>

        <div id="result"></div>

        <button id="downloadBtn" style="display:none;">
            Download CSV
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
